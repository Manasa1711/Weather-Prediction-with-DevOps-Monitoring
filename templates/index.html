<!DOCTYPE html>
<html>
<head>
    <title>Weather Prediction System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            color: #333;
        }

        .container {
            width: 400px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            background: #4facfe;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #007bff;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: green;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>🌦 Weather Prediction System</h2>

        <form action="/predict" method="post">
            <input type="number" step="any" name="temperature" placeholder="🌡 Temperature (°C)" required>
            <input type="number" step="any" name="humidity" placeholder="💧 Humidity (0–1)" required>
            <input type="number" step="any" name="wind" placeholder="🌬 Wind Speed (km/h)" required>

            <button type="submit">Predict</button>
        </form>

        {% if result %}
            <div class="result">
                {{ result }}
            </div>
        {% endif %}

        <div class="footer">
            DevOps Project | Flask + Docker + Kubernetes + Prometheus
        </div>
    </div>

</body>
</html>
